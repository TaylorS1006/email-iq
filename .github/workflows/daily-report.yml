name: Daily Email IQ Report

on:
  schedule:
    - cron: '0 13 * * *'  # 5am PT (UTC-8) / 6am PDT (UTC-7) — runs at 1pm UTC
  workflow_dispatch:       # also allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
          # Not a secret — just the Cloudflare Worker's public URL. Unset
          # until cloudflare-worker/ is deployed and this repo variable is
          # added; report.py omits Co-write entirely until then.
          COWRITE_WORKER_URL: ${{ vars.COWRITE_WORKER_URL }}
        run: python report.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Daily report update $(date -u '+%Y-%m-%d')"
          git push
